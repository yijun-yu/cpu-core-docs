site_name: 七级流水线 RISC-V CPU Core 文档
site_description: 集创赛竞业达赛题 — 七级流水线 + 2bit饱和计数器分支预测
site_author: yijun yu

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search:
      lang: zh
  # - git-revision-date-localized:
  #     type: datetime
  #     timezone: Asia/Shanghai
  #     locale: zh
  - glightbox

nav:
  - 首页: index.md
  - 整体架构:
    - 概览: 01-overview/index.md
    - 七级流水线: 01-overview/pipeline.md
  - 流水线各级:
    - IF 取指: 02-fetch/index.md
    - ID 译码: 03-decode/index.md
    - ISS 发射: 04-issue/index.md
    - EX 执行:
      - 概览: 05-execute/index.md
      - ALU: 05-execute/alu.md
      - 乘除法: 05-execute/muldiv.md
      - 分支预测: 05-execute/branch.md
      - Zbb 扩展: 05-execute/zbb.md
    - MEM 访存: 06-memory/index.md
    - WB 写回: 07-writeback/index.md
  - 控制逻辑:
    - 概览: 08-control/index.md
    - 冒险检测: 08-control/hazard.md
    - 前递单元: 08-control/forward.md
    - CSR 与陷阱: 08-control/csr.md
  - 踩坑记录: 09-lessons/index.md
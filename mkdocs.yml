site_name: RISC-V CPU 文档

site_description: 个人学习总结网站
site_author: yijun yu

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search:
      lang: zh
  # - git-revision-date-localized:
  #     type: datetime
  #     timezone: Asia/Shanghai
  #     locale: zh
  - glightbox

nav:
  - 首页: index.md
  - 环境与软件: env/index.md
  - 单周期:
    - ALU: single-cycle/alu.md
    - ALU_Control: single-cycle/alu_control.md
    - Control_Unit: single-cycle/control_unit.md
    - ImmGen: single-cycle/immgen.md
    - PC: single-cycle/pc.md
    - RegFile: single-cycle/regfile.md
    - 总体架构图: single-cycle/architecture.md
    - 数据通路图: single-cycle/datapath.md
  - 流水线: pipeline/index.md
  - 分支预测:
    - 2bit 饱和计数器: branch-prediction/two-bit-saturating-counter.md
    - GShare: branch-prediction/gshare.md
  - 多发射: superscalar/index.md
  - Cache: cache/index.md